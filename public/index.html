<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZK App FINAL</title>

    <style>
        body {
            font-family: 'Segoe UI';
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #resultado {
            margin-top: 15px;
            white-space: pre-wrap;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>ZK Verify</h2>

    <input id="score" placeholder="Score">
    <input id="min" placeholder="Min">
    <input id="max" placeholder="Max">
    <input id="age" placeholder="Age">

    <button onclick="verificar()">Verificar</button>

    <pre id="resultado"></pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/snarkjs@0.7.6/build/snarkjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
async function verificar() {

    const resultado = document.getElementById("resultado");

    try {

        const score = document.getElementById("score").value;

        resultado.innerText = "🧠 Generando proof...\n";

        const input = {
            threshold: 50,

            scoreCommitment: "1828694561859135142315785939528123813783741466470461312657280882272118608432",

            pymeIdentityCommitment: "6345863451453377512665308172968222120705674583383993850509137933149523989333",

            issuerPublicKey: [
                "13277427435165878497778222415993513565335242147425444199013288855685581939618",
                "13622229784656158136036771217484571176836296686641868549125388198837476602820"
            ],

            currentTime: 1500,

            verifierChallenge: 42,

            nullifier: "9459122632437298107768407837195669547800864835951019151397568864163023096687",

            rawScore: Number(score),

            pymeWallet: 999,

            modelVersion: 1,

            timestamp: 1000,

            expiration: 2000,

            commitmentSecret: 111,

            R8: [
                "5015139619045954206474415578725831664060734670977162064736430465212205601335",
                "7017476504340807006609949834212487295402829039004399303015852829970760537569"
            ],

            S: "1440017176449704957073697959354809310999861398155768461944574784261280978291"
        };

        const { proof, publicSignals } =
            await snarkjs.groth16.fullProve(
                input,
                "/wasm/ScoreProof_v2.wasm",
                "/zkey/ScoreProof_v2_final.zkey"
            );

        resultado.innerText += "📤 Proof generada\n";

        if (!window.ethereum) {
            throw new Error("MetaMask no detectado");
        }

        await window.ethereum.request({
            method: "eth_requestAccounts"
        });

        const provider =
            new ethers.providers.Web3Provider(window.ethereum);

        const signer = provider.getSigner();

        const contractAddress =
            "0x71cc8ff9AaA8D7a2074059F285D907808A0307a6";

        const abi = [
            "function verifyScore(uint256[2],uint256[2][2],uint256[2],uint256[8]) external"
        ];

        const contract =
            new ethers.Contract(contractAddress, abi, signer);

        const pA = proof.pi_a.slice(0, 2);

        const pB = [
            [proof.pi_b[0][1], proof.pi_b[0][0]],
            [proof.pi_b[1][1], proof.pi_b[1][0]]
        ];

        const pC = proof.pi_c.slice(0, 2);

        resultado.innerText += "⛓️ Enviando tx...\n";

        const tx =
            await contract.verifyScore(
                pA,
                pB,
                pC,
                publicSignals
            );

        await tx.wait();

        resultado.innerText +=
            "✅ Verificado en blockchain";

    } catch (err) {

        resultado.innerText =
            "ERROR: " + err.message;
    }
}
</script>

</body>
</html>
