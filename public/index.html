<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZK App FINAL</title>

    <style>
        body {
            font-family: 'Segoe UI';
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #resultado {
            margin-top: 15px;
            white-space: pre-wrap;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>ZK Verify</h2>

    <input id="score" placeholder="Score">
    <input id="min" placeholder="Min">
    <input id="max" placeholder="Max">
    <input id="age" placeholder="Age">

    <button onclick="verificar()">Verificar</button>

    <pre id="resultado"></pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
async function verificar() {
    const resultado = document.getElementById("resultado");

    try {
        // ✅ INPUTS REALES (NO HARDCODE)
        const score = document.getElementById("score").value;
        const min = document.getElementById("min").value;
        const max = document.getElementById("max").value;
        const age = document.getElementById("age").value;

        resultado.innerText = "⚠️ Generación de proof en frontend pendiente...\n";

        // ⚠️ Aquí iría snarkjs en fase siguiente

        // Mock temporal (solo para probar contrato)
        const pA = [0, 0];
        const pB = [[0, 0], [0, 0]];
        const pC = [0, 0];
        const pubSignals = [0,0,0,0,0,0,0,0];

        if (!window.ethereum) throw new Error("MetaMask no detectado");

        await window.ethereum.request({ method: 'eth_requestAccounts' });

        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();

        const contractAddress = "TU_CONTRATO_AQUI";

        const abi = [
            "function verifyScore(uint256[2],uint256[2][2],uint256[2],uint256[8]) external"
        ];

        const contract = new ethers.Contract(contractAddress, abi, signer);

        resultado.innerText += "⛓️ Enviando transacción...\n";

        const tx = await contract.verifyScore(pA, pB, pC, pubSignals);
        await tx.wait();

        resultado.innerText += "✅ Verificado en blockchain";

    } catch (err) {
        resultado.innerText = "ERROR: " + err.message;
    }
}
</script>

</body>
</html>
