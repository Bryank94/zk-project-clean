<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>ZK App FINAL</title>

    <style>
        body {
            font-family: 'Segoe UI';
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #667eea, #764ba2);
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 12px;
            width: 400px;
            text-align: center;
        }

        input {
            width: 100%;
            margin: 5px 0;
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            box-sizing: border-box;
        }

        button {
            margin-top: 10px;
            padding: 12px;
            width: 100%;
            border: none;
            border-radius: 8px;
            background: #4CAF50;
            color: white;
            font-weight: bold;
            cursor: pointer;
        }

        #resultado {
            margin-top: 15px;
            white-space: pre-wrap;
            text-align: left;
        }
    </style>
</head>

<body>

<div class="container">
    <h2>ZK Verify</h2>

    <input id="score" placeholder="Score">
    <input id="min" placeholder="Min">
    <input id="max" placeholder="Max">
    <input id="age" placeholder="Age">

    <button onclick="verificar()">Verificar</button>

    <pre id="resultado"></pre>
</div>

<script src="https://cdn.jsdelivr.net/npm/snarkjs@0.7.6/build/snarkjs.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/ethers@5.7.2/dist/ethers.umd.min.js"></script>

<script>
async function verificar() {
    const resultado = document.getElementById("resultado");

    try {
        const score = document.getElementById("score").value;
        const min = document.getElementById("min").value;
        const max = document.getElementById("max").value;
        const age = document.getElementById("age").value;

        resultado.innerText = "🧠 Generando proof...\n";

        const input = {
            rawScore: score,
            min: min,
            max: max,
            age: age,
            threshold: 50,
            scoreCommitment: 0,
            pymeIdentityCommitment: 0,
            issuerPublicKey: ["0", "0"],
            currentTime: 0,
            verifierChallenge: 0,
            nullifier: 0,
            pymeWallet: 0,
            modelVersion: 1,
            timestamp: 0,
            expiration: 0,
            commitmentSecret: 0,
            R8: ["0", "0"],
            S: "0"
        };

        const { proof, publicSignals } = await snarkjs.groth16.fullProve(
            input,
            "../zk-real/build/ScoreProof_v2_js/ScoreProof_v2.wasm",
            "../zk-real/build/ScoreProof_v2_final.zkey"
        );

        resultado.innerText += "📤 Proof generada\n";

        if (!window.ethereum) {
            throw new Error("MetaMask no detectado");
        }

        await window.ethereum.request({ method: "eth_requestAccounts" });

        const provider = new ethers.providers.Web3Provider(window.ethereum);
        const signer = provider.getSigner();

        // CAMBIA ESTO POR LA DIRECCION REAL DE TU CONTRATO
        const contractAddress = "0x578d766A7DB96F605F0CA2897635060b4675FB14";

        const abi = [
            "function verifyScore(uint256[2],uint256[2][2],uint256[2],uint256[8]) external"
        ];

        const contract = new ethers.Contract(contractAddress, abi, signer);

        const pA = proof.pi_a.slice(0, 2);

        const pB = [
            [proof.pi_b[0][1], proof.pi_b[0][0]],
            [proof.pi_b[1][1], proof.pi_b[1][0]]
        ];

        const pC = proof.pi_c.slice(0, 2);

        resultado.innerText += "⛓️ Enviando tx...\n";

        const tx = await contract.verifyScore(pA, pB, pC, publicSignals);
        await tx.wait();

        resultado.innerText += "✅ Verificado en blockchain";

    } catch (err) {
        resultado.innerText = "ERROR: " + err.message;
    }
}
</script>

</body>
</html>
